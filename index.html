<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나라별 세계 테마 무기조합</title>

        body {

            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
        }

        .watermark {
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 1px;
            font-weight: 500;
            user-select: none;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            max-width: 650px;
            width: 100%;
        }

        h1 {
            font-size: 2.3rem;
            margin-bottom: 25px;
            color: #4ed9ff;
            text-shadow: 0 0 15px rgba(78, 217, 255, 0.4);
        }

        #spin-btn {
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 1.6rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 114, 255, 0.4);
            transition: all 0.2s ease;
            outline: none;
        }

        #spin-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 114, 255, 0.6);
        }

        #spin-btn:disabled {
            background: #444;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
            color: #aaa;
        }

        #result-box {
            margin-top: 35px;
            min-height: 250px;
        }

        .country-name {
            font-size: 2.2rem;
            font-weight: 800;
            color: #ffeb3b;
            margin-bottom: 25px;
            text-shadow: 0 0 10px rgba(255, 235, 59, 0.3);
        }

        .fire-title {
            color: #ff4b2b !important;
            text-shadow: 0 0 20px rgba(255, 75, 43, 0.8) !important;
            animation: flame 0.5s infinite alternate;
        }

        .ice-title {
            color: #7bf0ff !important;
            text-shadow: 0 0 20px rgba(123, 240, 255, 0.8) !important;
            animation: frost 0.5s infinite alternate;
        }

        .korea-title {
            color: #ff4757 !important;
            text-shadow: 0 0 20px rgba(255, 71, 87, 0.6), 0 0 10px #1e90ff !important;
        }

        .jackpot-title {

            text-shadow: 0 0 25px rgba(255, 215, 0, 0.9), 0 0 10px #ff8c00 !important;
            animation: flame 0.3s infinite alternate;
        }

        .weapon-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            animation: fadeIn 0.4s ease-in-out;
        }

        @media (max-width: 480px) {

            background: rgba(255, 255, 255, 0.06);
            padding: 15px;
            border-radius: 12px;
            border-top: 4px solid #4ed9ff;
            text-align: left;

            font-weight: bold;

            letter-spacing: 0.5px;

            color: #fff;
            text-shadow: 0 0 10px rgba(255, 75, 43, 0.5);

            border: 2px dashed #ffd700;
            padding: 25px 20px;
            border-radius: 16px;
            font-size: 1.2rem;
            font-weight: 600;
            color: #fff;
            line-height: 1.6;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.4);

            padding: 12px;
            border-radius: 8px;
            color: #ffd700;
            font-family: monospace;
            border: 1px solid rgba(255, 215, 0, 0.3);

        .summary-korea { background: rgba(30, 144, 255, 0.1) !important; border: 1px dashed rgba(255, 71, 87, 0.4) !important; }
        .summary-jackpot { background: rgba(255, 215, 0, 0.1) !important; border: 1px dashed rgba(255, 215, 0, 0.5) !important; }

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playTickSound(frequency = 400, type = 'sine', duration = 0.05) {
    try {
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    } catch(e) {}
}

function playWinSound() {
    try {
        const now = audioCtx.currentTime;
        const freqs = [523.25, 659.25, 783.99, 1046.50]; 
        freqs.forEach((f, i) => {
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.frequency.setValueAtTime(f, now + i * 0.08);
            gainNode.gain.setValueAtTime(0.08, now + i * 0.08);
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 0.4);
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start(now + i * 0.08);
            osc.stop(now + i * 0.08 + 0.4);
        });
    } catch(e) {}
}

function playNormalEndSound() {
    playTickSound(587.33, 'triangle', 0.15);

function generateSummary(countryName) {
    if (countryName === "🗡️ 총검조합") {
        return "완벽한 근접 찌르기와 권총 연사를 상정한 전형적인 돌격형 백병전 특화 커스텀 세트입니다.";
    }
    const descriptions = [
        `해당 국가의 역사적 군사 전통과 지형적 특색을 가미하여 야전에서 최고의 효율을 낼 수 있도록 구성한 맞춤 전술 세트입니다.`,

        `해당 국가 특유의 기후 환경 속에서 대원들이 무기를 다룰 때 가장 안정감 있는 생존력을 발휘할 수 있는 구성입니다.`,
        `전통적인 전투 방식의 매력과 현대 기술력의 조화를 보여주는 세팅으로, 기습과 전면전 모두에서 강력한 위력을 발휘합니다.`
    ];
    const index = Math.abs(countryName.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0)) % descriptions.length;
    return `${countryName} 테마에 맞춰 매칭된 조합입니다. ${descriptions[index]}`;
}

    function roll() {
        const rand = Math.random();
        // 화면 돌아가는 연출 애니메이션용 분기
        if (rand < 0.053) {
            resultBox.innerHTML = `<div class="country-name" style="color: #cbd5e1;">🗡️ 총검조합</div>`;
        } else if (rand < 0.15) {
            resultBox.innerHTML = `<div class="country-name">🎁 BONUS (보너스)</div>`;
        } else if (rand < 0.25) {
            resultBox.innerHTML = `<div class="country-name fire-title">🔥 불조합 (HOT!)</div>`;
        } else if (rand < 0.35) {
            resultBox.innerHTML = `<div class="country-name ice-title">❄️ 얼음조합 (COLD!)</div>`;
        } else if (rand < 0.45) {
            resultBox.innerHTML = `<div class="country-name korea-title">🇰🇷 대한민국</div>`;
        } else {
            const randomIndex = Math.floor(Math.random() * worldCountries.length);
            resultBox.innerHTML = `<div class="country-name">${worldCountries[randomIndex]}</div>`;
        }

        const tone = 300 + (elapsed / duration) * 200; 
        playTickSound(tone, 'triangle', 0.04);

        elapsed += currentInterval;
        
        if (elapsed > duration * 0.6) {
            currentInterval += 25; 
        }

        if (elapsed >= duration) {
            // 🚨 초희귀 대박 잭팟 확률 체크
            const jackpotRand = Math.random();
            if (jackpotRand < 1e-24) {
                playWinSound();
                resultBox.innerHTML = `
                    <div class="country-name jackpot-title">🎉 스킨케이스 이벤트 당첨! 🎉</div>
                    <div class="jackpot-card">
                        축하드립니다! 당신은 말도 안돼는 확률에 당첨되어 스킨케이스를 받으실수 있습니다! (개발자 메시지로 보내주세요)
                        <div class="msg-box">
                            <strong>[메시지 양식]</strong><br>저 당첨됐어요! 사진보낸후 답장 기다리기
                        </div>
                    </div>
                    <div class="summary-box summary-jackpot">
                        💡 <strong>시스템 알림:</strong> 우주가 무너질 확률을 뚫고 당첨되셨습니다! 스크린샷을 즉시 저장하세요.
                    </div>
                `;
                btn.innerText = "룰렛돌리기";
                btn.disabled = false;
                return; 
            }

            // 최종 결과 연산 확률 배포
            const finalRand = Math.random(); 
            
            if (finalRand < 0.053) { 
                // 🎯 총검조합 확정 확률: 정확히 5.3%
                playNormalEndSound();
                showBayonetLayout(resultBox);
            } else if (finalRand < 0.153) { 
                // 보너스 확률 (10%)
                playWinSound(); 
                resultBox.innerHTML = `
                    <div class="country-name">🎁 BONUS (보너스)</div>
                    <div class="bonus-card">
                        🔥 원하는 무기를 아무거나 사용하실수 있습니다. 🔥
                    </div>
                    <div class="summary-box">
                        💡 <strong>조합 분석:</strong> 축하합니다! 대박 행운의 프리패스 보너스 타임입니다.
                    </div>
                `;
            } else if (finalRand < 0.253) { 
                // 불조합 확률 (10%)
                playWinSound(); 
                resultBox.innerHTML = `
                    <div class="country-name fire-title">🔥 불조합 (HOT!)</div>
                    <div class="weapon-grid">
                        <div class="weapon-card" style="border-top-color: #ff4500;">
                            <div class="weapon-type">🔴 주무기</div>
                            <div class="weapon-name">화염방사기</div>
                        </div>
                        <div class="weapon-card" style="border-top-color: #ff8c00;">
                            <div class="weapon-type">🟠 보조무기</div>
                            <div class="weapon-name">플레어건</div>
                        </div>
                        <div class="weapon-card" style="border-top-color: #ff0000;">
                            <div class="weapon-type">🟡 근접무기</div>
                            <div class="weapon-name">전기톱</div>
                        </div>
                        <div class="weapon-card" style="border-top-color: #d2691e;">
                            <div class="weapon-type">🟢 유틸리티</div>
                            <div class="weapon-name">화염병</div>
                        </div>
                    </div>
                    <div class="summary-box summary-fire">
                        💡 <strong>조합 분석:</strong> 전장을 불바다로 만들어 흔적도 없이 소탕해 버리는 화끈한 파괴 전용 불지옥 세팅입니다!
                    </div>
                `;
            } else if (finalRand < 0.353) {
                // 얼음조합 확률 (10%)
                playWinSound(); 
                resultBox.innerHTML = `
                    <div class="country-name ice-title">❄️ 얼음조합 (COLD!)</div>
                    <div class="weapon-grid">
                        <div class="weapon-card" style="border-top-color: #00ffff;">
                            <div class="weapon-type">🔴 주무기</div>
                            <div class="weapon-name">만년서리</div>
                        </div>
                        <div class="weapon-card" style="border-top-color: #00bfff;">
                            <div class="weapon-type">🟠 보조무기</div>
                            <div class="weapon-name">쇼티</div>
                        </div>
                        <div class="weapon-card" style="border-top-color: #1e90ff;">
                            <div class="weapon-type">🟡 근접무기</div>
                            <div class="weapon-name">나이프</div>
                        </div>
                        <div class="weapon-card" style="border-top-color: #4682b4;">
                            <div class="weapon-type">🟢 유틸리티</div>
                            <div class="weapon-name">얼음 광선총</div>
                        </div>
                    </div>
                    <div class="summary-box summary-ice">
                        💡 <strong>조합 분석:</strong> 상대를 순식간에 동결시켜 꼼짝 못 하게 무력화하는 극지방 기조의 절대 냉각 세팅입니다!
                    </div>
                `;
            } else if (finalRand < 0.453) {
                // 대한민국 확률 (10%)
                playWinSound();
                const mainWp = weaponsData.main[Math.floor(Math.random() * weaponsData.main.length)];
                const subWp = weaponsData.sub[Math.floor(Math.random() * weaponsData.sub.length)];
                const meleeWp = weaponsData.melee[Math.floor(Math.random() * weaponsData.melee.length)];
                const utilityWp = weaponsData.utility[Math.floor(Math.random() * weaponsData.utility.length)];
                
                resultBox.innerHTML = `
                    <div class="country-name korea-title">🇰🇷 대한민국</div>
                    <div class="weapon-grid">
                        <div class="weapon-card" style="border-top-color: #ff4757;">
                            <div class="weapon-type">🔴 주무기</div>
                            <div class="weapon-name">${mainWp}</div>
                        </div>
                        <div class="weapon-card" style="border-top-color: #1e90ff;">
                            <div class="weapon-type">🟠 보조무기</div>
                            <div class="weapon-name">${subWp}</div>
                        </div>
                        <div class="weapon-card" style="border-top-color: #ffffff;">
                            <div class="weapon-type">🟡 근접무기</div>
                            <div class="weapon-name">${meleeWp}</div>
                        </div>
                        <div class="weapon-card" style="border-top-color: #2ed573;">
                            <div class="weapon-type">🟢 유틸리티</div>
                            <div class="weapon-name">${utilityWp}</div>
                        </div>
                    </div>
                    <div class="summary-box summary-korea">
                        💡 <strong>조합 분석:</strong> 축하합니다! 높은 확률을 뚫고 자랑스러운 대한민국 연합 전술 세트가 매칭되었습니다!
                    </div>
                `;
            } else {
                // 나머지 확률로 일반 국가 무작위 선정
                playNormalEndSound(); 
                const finalCountry = worldCountries[Math.floor(Math.random() * worldCountries.length)];
                
                const mainWp = weaponsData.main[Math.floor(Math.random() * weaponsData.main.length)];
                const subWp = weaponsData.sub[Math.floor(Math.random() * weaponsData.sub.length)];
                const meleeWp = weaponsData.melee[Math.floor(Math.random() * weaponsData.melee.length)];
                const utilityWp = weaponsData.utility[Math.floor(Math.random() * weaponsData.utility.length)];
                
                resultBox.innerHTML = `
                    <div class="country-name">${finalCountry}</div>
                    <div class="weapon-grid">
                        <div class="weapon-card" style="border-top-color: #ff416c;">
                            <div class="weapon-type">🔴 주무기</div>
                            <div class="weapon-name">${mainWp}</div>
                        </div>
                        <div class="weapon-card" style="border-top-color: #ff4b2b;">
                            <div class="weapon-type">🟠 보조무기</div>
                            <div class="weapon-name">${subWp}</div>
                        </div>
                        <div class="weapon-card" style="border-top-color: #00c6ff;">
                            <div class="weapon-type">🟡 근접무기</div>
                            <div class="weapon-name">${meleeWp}</div>
                        </div>
                        <div class="weapon-card" style="border-top-color: #2ed573;">
                            <div class="weapon-type">🟢 유틸리티</div>
                            <div class="weapon-name">${utilityWp}</div>
                        </div>
                    </div>
                    <div class="summary-box">
                        💡 <strong>조합 분석:</strong> ${generateSummary(finalCountry)}
                    </div>
                `;
            }
            
            btn.innerText = "룰렛돌리기";
            btn.disabled = false;
        } else {
            setTimeout(roll, currentInterval);
        }
    }

    setTimeout(roll, currentInterval);
}
</script>
